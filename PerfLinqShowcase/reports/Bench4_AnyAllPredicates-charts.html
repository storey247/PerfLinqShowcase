<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bench4: Any/All Predicates — Performance Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; margin: 0; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 2rem; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; }
    h2 { font-size: 1rem; margin: 0 0 1rem; color: #58a6ff; }
    canvas { max-height: 320px; }
    .note { color: #8b949e; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Bench4: Any/All Predicates</h1>
  <p class="subtitle">BenchmarkDotNet · .NET 10 · Apple M3 Max · Arm64 RyuJIT AdvSIMD</p>

  <div class="charts">
    <div class="chart-card" style="grid-column: span 2">
      <h2>Mean Execution Time (ns) — grouped by Scale</h2>
      <canvas id="meanGrouped"></canvas>
    </div>
    <div class="chart-card">
      <h2>Ratio to Baseline (Foreach nested loops = 1×)</h2>
      <canvas id="ratio"></canvas>
    </div>
    <div class="chart-card">
      <h2>Memory Allocated (bytes)</h2>
      <canvas id="alloc"></canvas>
    </div>
  </div>

  <p class="note">Environment: .NET SDK 10.0.100 · macOS 26.4.1 (Darwin 25.4.0)</p>

<script>
const METHODS = [
  'Foreach: nested loops w/ early exit (baseline)',
  'LINQ: Where → ToList → Where(Any(All(…)))',
  'LINQ: Where(Any(All(…))) — nested predicate chain',
  'LINQ: new HashSet per employee (micro-alloc trap)',
];
const COLORS = ['#58a6ff', '#f78166', '#d2a8ff', '#ffa657'];
const scales = ['Small', 'Medium', 'Large'];
const gridColor = '#30363d';
const tickColor = '#8b949e';

const means = {
  'Foreach: nested loops w/ early exit (baseline)':    [819.3,   6869.0,  69093.9],
  'LINQ: Where → ToList → Where(Any(All(…)))':         [1458.8,  9249.3,  69022.7],
  'LINQ: Where(Any(All(…))) — nested predicate chain': [1514.7, 10596.4,  83315.6],
  'LINQ: new HashSet per employee (micro-alloc trap)': [9461.1, 58826.8, 555053.7],
};
const ratios = {
  'Foreach: nested loops w/ early exit (baseline)':    [1.00, 1.00, 1.00],
  'LINQ: Where → ToList → Where(Any(All(…)))':         [1.78, 1.35, 1.00],
  'LINQ: Where(Any(All(…))) — nested predicate chain': [1.85, 1.54, 1.21],
  'LINQ: new HashSet per employee (micro-alloc trap)': [11.55, 8.56, 8.03],
};
const alloc = {
  'Foreach: nested loops w/ early exit (baseline)':    [88,     88,    32],
  'LINQ: Where → ToList → Where(Any(All(…)))':         [1568,  6576, 32728],
  'LINQ: Where(Any(All(…))) — nested predicate chain': [776,   1504,  3856],
  'LINQ: new HashSet per employee (micro-alloc trap)': [37856, 209504, 1122816],
};

function baseScales(yTitle) {
  return {
    x: { ticks: { color: tickColor }, grid: { color: gridColor } },
    y: { title: { display: true, text: yTitle, color: tickColor }, ticks: { color: tickColor }, grid: { color: gridColor } },
  };
}

new Chart(document.getElementById('meanGrouped'), {
  type: 'bar',
  data: {
    labels: scales,
    datasets: METHODS.map((m, i) => ({
      label: m, data: means[m],
      backgroundColor: COLORS[i], borderColor: COLORS[i], borderRadius: 4,
    })),
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: tickColor } } },
    scales: baseScales('Mean (ns)'),
  },
});

new Chart(document.getElementById('ratio'), {
  type: 'bar',
  data: {
    labels: scales,
    datasets: METHODS.map((m, i) => ({
      label: m, data: ratios[m],
      backgroundColor: COLORS[i], borderColor: COLORS[i], borderRadius: 4,
    })),
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: tickColor } } },
    scales: baseScales('Ratio (1× = baseline)'),
  },
});

new Chart(document.getElementById('alloc'), {
  type: 'bar',
  data: {
    labels: scales,
    datasets: METHODS.map((m, i) => ({
      label: m, data: alloc[m],
      backgroundColor: COLORS[i], borderColor: COLORS[i], borderRadius: 4,
    })),
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: tickColor } } },
    scales: baseScales('Allocated (bytes)'),
  },
});
</script>
</body>
</html>
